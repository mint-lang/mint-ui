name: CI

on:
  push:
    branches:
      - master
    tags:
      - "*"

  pull_request:
    branches:
      - master

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install tools from asdf config
        uses: asdf-vm/actions/install@v4

      - name: Install dependencies
        run: mint install

      - name: Run tests
        run: mint test -b firefox
